name: tank_game
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  get: ^4.7.2
  uuid: ^4.5.1
  bloc: ^9.0.0
  get_it: ^8.0.2
  shimmer: ^3.0.0
  hive_ce: ^2.11.3
  injectable: ^2.5.0
  flutter_udid: ^4.0.0
