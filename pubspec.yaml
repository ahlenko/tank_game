  firebase_core: any
  cloud_firestore: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.6
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.9.3
  json_serializable: ^6.7.1
